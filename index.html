<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Jomon Eats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="htop">
    <div class="brand">
      <img src="IMG_2764.jpeg" alt="logo" onerror="this.style.display='none'">
      <span class="txt">Jomon<span>Eats</span></span>
    </div>
    <span class="badge">請求 ¥0</span>
  </div>
  <div class="deliver-to" id="deliverTo" style="display:none;"></div>
  <div class="jomon-bar">
    <div class="jc-left">
      <span class="jc-title">JOMON カウンター</span>
      <span class="jc-count" id="jcCount">0回</span>
    </div>
    <div class="jc-rank" id="jcRank">計測中…</div>
  </div>
</header>

<!-- 住所入力 -->
<section id="addr" class="screen active">
  <div class="addr-box">
    <h2>お届け先を入力</h2>
    <p class="hint">番地は不要。市区町村＋町名まででOK。実際の料理は届かず、料金もかかりません。背徳感だけ持ち帰ってください。</p>
    <input type="text" id="addrInput" placeholder="例：東京都渋谷区神南">
    <button class="primary" onclick="setAddress()">この住所で探す</button>
    <p class="addr-msg" id="addrMsg"></p>
  </div>
</section>

<!-- 店舗一覧 -->
<section id="shops" class="screen">
  <div class="promos" id="promos"></div>
  <div class="cats" id="cats"></div>
  <div class="shop-list" id="shopList"></div>
</section>

<!-- 店舗詳細・メニュー -->
<section id="menu" class="screen">
  <button class="back" onclick="go('shops')">← 戻る</button>
  <div id="menuBody"></div>
</section>

<!-- カート -->
<section id="cart" class="screen">
  <button class="back" onclick="go('menu')">← 戻る</button>
  <h2 class="sec-title">カート</h2>
  <div id="cartBody"></div>
</section>

<!-- 追跡 -->
<section id="track" class="screen">
  <h2 class="sec-title">配達中</h2>
  <div id="map"></div>
  <div id="trackInfo"></div>
  <div class="real-ad" id="realAd" style="display:none;"></div>
</section>

<!-- 固定カートバー -->
<div class="cartbar" id="cartbar" style="display:none;" onclick="go('cart')">
  <span id="cartbarCount">0点</span>
  <span id="cartbarTotal">¥0</span>
  <span class="cartbar-go">カートを見る →</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
