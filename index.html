<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Jomon Eats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="htop">
    <div class="brand">
      <img src="IMG_2764.jpeg" alt="logo">
      <div class="txt">Jomon<span>Eats</span></div>
    </div>
    <div class="badge">請求 ¥0</div>
  </div>
  <div class="deliver-to" id="deliverTo" style="display:none"></div>
  <div class="jomon-bar">
    <div class="jc-left">
      <div class="jc-title">JOMON COUNTER</div>
      <div class="jc-count" id="jcCount">—</div>
    </div>
    <div class="jc-rank" id="jcRank">計測中…</div>
  </div>
</header>

<section class="screen active" id="address">
  <div class="addr-box">
    <h2>どこにお届けしますか？</h2>
    <p class="hint">住所を入れると、近くの“背徳系”店舗が表示されます。<br>料理は届きません。請求も永遠に ¥0 です。</p>
    <input type="text" id="addrInput" placeholder="例：東京都新宿区西新宿2-8-1" autocomplete="off">
    <button class="primary" onclick="setAddress()">この住所で探す</button>
    <div class="addr-msg" id="addrMsg"></div>
  </div>
</section>

<section class="screen" id="shops">
  <div class="promos" id="promos"></div>
  <div class="cats" id="cats"></div>
  <div id="shopList"></div>
</section>

<section class="screen" id="menu">
  <button class="back" onclick="go('shops')">← 店舗一覧へ</button>
  <div id="menuBody"></div>
</section>

<section class="screen" id="cart">
  <button class="back" onclick="go('menu')">← メニューへ</button>
  <h2 class="sec-title">カート</h2>
  <div id="cartBody"></div>
</section>

<section class="screen" id="track">
  <h2 class="sec-title">配達状況</h2>
  <div id="map"></div>
  <div id="trackInfo"></div>
  <div class="real-ad" id="realAd" style="display:none"></div>
  <button class="back" style="margin-top:20px" onclick="go('shops')">← もう一度注文する</button>
</section>

<div class="cartbar" id="cartbar" style="display:none" onclick="go('cart')">
  <span id="cartbarCount">0点</span>
  <span id="cartbarTotal">¥0</span>
  <span class="cartbar-go">カートを見る →</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
