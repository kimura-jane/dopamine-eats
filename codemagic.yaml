workflows:

  ios-workflow:
    name: Jomon Eats iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jomon.eats
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Prepare www folder (copy web assets)
        script: |
          mkdir -p www
          cp index.html style.css data.js app.js www/ 2>/dev/null || true
          cp IMG_2764.jpeg www/ 2>/dev/null || true
          cp privacy.html www/ 2>/dev/null || true
          ls -la www
      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Generate app icons and splash
        script: |
          mkdir -p assets

          # --- アイコン用 PNG を用意（icon.JPG → icon.png 変換） ---
          if [ -f "assets/icon.png" ]; then
            echo "icon.png already exists"
          elif [ -f "assets/icon.JPG" ]; then
            sips -s format png assets/icon.JPG --out assets/icon.png
          elif [ -f "assets/icon.jpg" ]; then
            sips -s format png assets/icon.jpg --out assets/icon.png
          elif [ -f "assets/icon.jpeg" ]; then
            sips -s format png assets/icon.jpeg --out assets/icon.png
          fi

          # --- スプラッシュ用 SVG を生成（白背景・中央に Jomon Eats） ---
          cat > assets/splash.svg <<'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="2732" height="2732" viewBox="0 0 2732 2732">
            <rect width="2732" height="2732" fill="#ffffff"/>
            <text x="1366" y="1390" text-anchor="middle"
                  font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="240">
              <tspan fill="#0a0a0a">Jomon</tspan><tspan fill="#06c167"> Eats</tspan>
            </text>
            <text x="1366" y="1530" text-anchor="middle"
                  font-family="Helvetica, Arial, sans-serif" font-size="70" fill="#6b6b6b">
              背徳のフードデリバリー
            </text>
          </svg>
          EOF

          # SVG を PNG に変換（cairosvg を使う・最も確実）
          pip3 install cairosvg 2>/dev/null || pip3 install --user cairosvg 2>/dev/null || true
          python3 -c "import cairosvg; cairosvg.svg2png(url='assets/splash.svg', write_to='assets/splash.png', output_width=2732, output_height=2732)" 2>/dev/null || true

          # cairosvg がダメなら rsvg-convert を試す
          if [ ! -f "assets/splash.png" ]; then
            if command -v rsvg-convert >/dev/null 2>&1; then
              rsvg-convert -w 2732 -h 2732 assets/splash.svg -o assets/splash.png
            fi
          fi

          # それでもダメなら、白背景の上にアイコンを中央配置したスプラッシュを作る
          if [ ! -f "assets/splash.png" ]; then
            pip3 install pillow 2>/dev/null || pip3 install --user pillow 2>/dev/null || true
            python3 - <<'PY'
from PIL import Image
bg = Image.new("RGB", (2732, 2732), "white")
try:
    ic = Image.open("assets/icon.png").convert("RGBA")
    ic.thumbnail((900, 900))
    x = (2732 - ic.width)//2
    y = (2732 - ic.height)//2
    bg.paste(ic, (x, y), ic)
except Exception as e:
    print("icon paste skipped:", e)
bg.save("assets/splash.png")
PY
          fi

          echo "=== assets の中身 ==="
          ls -la assets
          echo "=== splash.png ができているか確認 ==="
          file assets/splash.png || echo "splash.png なし"

          npm install -D @capacitor/assets
          npx capacitor-assets generate --ios
      - name: Sync Capacitor (copy web assets to iOS project)
        script: |
          npx cap sync ios
      - name: Cocoapods installation
        script: |
          cd ios/App && pod install
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(date +%s)
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - where.is.my.oasis1216@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
