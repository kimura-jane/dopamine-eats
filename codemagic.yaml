workflows:

  ios-workflow:
    name: Jomon Eats iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jomon.eats
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Prepare www folder (copy web assets)
        script: |
          mkdir -p www
          cp index.html style.css data.js app.js www/ 2>/dev/null || true
          cp IMG_2764.jpeg www/ 2>/dev/null || true
          cp privacy.html www/ 2>/dev/null || true
          ls -la www
      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Generate app icons and splash
        script: |
          mkdir -p assets

          # --- アイコン用 PNG を用意（icon.JPG → icon.png 変換） ---
          if [ -f "assets/icon.png" ]; then
            echo "icon.png already exists"
          elif [ -f "assets/icon.JPG" ]; then
            sips -s format png assets/icon.JPG --out assets/icon.png
          elif [ -f "assets/icon.jpg" ]; then
            sips -s format png assets/icon.jpg --out assets/icon.png
          elif [ -f "assets/icon.jpeg" ]; then
            sips -s format png assets/icon.jpeg --out assets/icon.png
          fi

          # --- スプラッシュ用 SVG を生成（白背景・中央に Jomon Eats） ---
          cat > assets/splash.svg <<'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="2732" height="2732" viewBox="0 0 2732 2732">
            <rect width="2732" height="2732" fill="#ffffff"/>
            <text x="1366" y="1390" text-anchor="middle"
                  font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="240">
              <tspan fill="#0a0a0a">Jomon</tspan><tspan fill="#06c167"> Eats</tspan>
            </text>
            <text x="1366" y="1530" text-anchor="middle"
                  font-family="Helvetica, Arial, sans-serif" font-weight="500" font-size="70" fill="#6b6b6b">
              背徳のフードデリバリー
            </text>
          </svg>
          EOF

          # SVG を PNG に変換
          if command -v rsvg-convert >/dev/null 2>&1; then
            rsvg-convert -w 2732 -h 2732 assets/splash.svg -o assets/splash.png
          elif command -v qlmanage >/dev/null 2>&1; then
            qlmanage -t -s 2732 -o assets assets/splash.svg
            mv assets/splash.svg.png assets/splash.png 2>/dev/null || true
          fi

          # 万一 splash.png が作れなかった場合は白一色で代用
          if [ ! -f "assets/splash.png" ]; then
            sips -s format png --resampleHeightWidth 2732 2732 assets/icon.png --out assets/splash.png 2>/dev/null || true
          fi

          ls -la assets
          npm install -D @capacitor/assets
          npx capacitor-assets generate --ios
      - name: Sync Capacitor (copy web assets to iOS project)
        script: |
          npx cap sync ios
      - name: Cocoapods installation
        script: |
          cd ios/App && pod install
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(date +%s)
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - where.is.my.oasis1216@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
