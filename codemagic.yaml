workflows:

  ios-workflow:
    name: Jomon Eats iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jomon.eats
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Prepare www folder (copy web assets)
        script: |
          mkdir -p www
          cp index.html style.css data.js app.js www/ 2>/dev/null || true
          cp IMG_2764.jpeg www/ 2>/dev/null || true
          cp privacy.html www/ 2>/dev/null || true
          ls -la www
      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Generate app icons and splash
        script: |
          mkdir -p assets

          # アイコン用 PNG を用意（icon.JPG を PNG に変換）
          if [ -f "assets/icon.png" ]; then
            echo "icon.png already exists"
          elif [ -f "assets/icon.JPG" ]; then
            sips -s format png assets/icon.JPG --out assets/icon.png
          elif [ -f "assets/icon.jpg" ]; then
            sips -s format png assets/icon.jpg --out assets/icon.png
          elif [ -f "assets/icon.jpeg" ]; then
            sips -s format png assets/icon.jpeg --out assets/icon.png
          fi

          # スプラッシュ用 SVG を生成（白背景・中央に Jomon Eats）
          printf '%s\n' '<svg xmlns="http://www.w3.org/2000/svg" width="2732" height="2732" viewBox="0 0 2732 2732">' '<rect width="2732" height="2732" fill="#ffffff"/>' '<text x="1366" y="1390" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="240"><tspan fill="#0a0a0a">Jomon</tspan><tspan fill="#06c167"> Eats</tspan></text>' '<text x="1366" y="1530" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="70" fill="#6b6b6b">背徳のフードデリバリー</text>' '</svg>' > assets/splash.svg

          # SVG を PNG に変換（cairosvg を優先、ダメなら rsvg-convert）
          pip3 install cairosvg >/dev/null 2>&1 || true
          python3 -c "import cairosvg; cairosvg.svg2png(url='assets/splash.svg', write_to='assets/splash.png', output_width=2732, output_height=2732)" || true
          if [ ! -f "assets/splash.png" ]; then
            rsvg-convert -w 2732 -h 2732 assets/splash.svg -o assets/splash.png || true
          fi

          echo "=== assets の中身 ==="
          ls -la assets
          echo "=== splash.png 確認 ==="
          file assets/splash.png || echo "splash.png なし"

          npm install -D @capacitor/assets
          npx capacitor-assets generate --ios
      - name: Sync Capacitor (copy web assets to iOS project)
        script: |
          npx cap sync ios
      - name: Force overwrite Splash images (light + dark) with our white splash
        script: |
          IMGSET="ios/App/App/Assets.xcassets/Splash.imageset"
          mkdir -p "$IMGSET"
          echo "=== 上書き前の Splash.imageset ==="
          ls -la "$IMGSET" || true

          # 自作の白背景 splash.png を、Splash.imageset 内の全 PNG に物理コピー（通常＋ダーク両方）
          for f in "$IMGSET"/*.png; do
            if [ -f "$f" ]; then
              cp assets/splash.png "$f"
              echo "overwrote: $f"
            fi
          done

          # 念のため、想定される全ファイル名を明示的に上書き（存在しなければ作成）
          for name in \
            "Default@1x~universal~anyany.png" \
            "Default@2x~universal~anyany.png" \
            "Default@3x~universal~anyany.png" \
            "Default@1x~universal~anyany-dark.png" \
            "Default@2x~universal~anyany-dark.png" \
            "Default@3x~universal~anyany-dark.png"; do
            cp assets/splash.png "$IMGSET/$name"
          done

          echo "=== 上書き後の Splash.imageset ==="
          ls -la "$IMGSET"
          echo "=== 上書き後の各ファイルサイズ確認（全て同じサイズなら成功） ==="
          for f in "$IMGSET"/*.png; do
            file "$f"
          done
      - name: Fix LaunchScreen storyboard (white bg + fullscreen splash)
        script: |
          STORYBOARD="ios/App/App/Base.lproj/LaunchScreen.storyboard"
          mkdir -p "ios/App/App/Base.lproj"
          cat > "$STORYBOARD" <<'STORYEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21507" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <device id="retina6_12" orientation="portrait" appearance="light"/>
              <dependencies>
                  <deployment identifier="iOS"/>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21505"/>
                  <capability name="Safe area layout guides" minToolsVersion="9.0"/>
                  <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <imageView clipsSubviews="YES" userInteractionEnabled="NO" contentMode="scaleAspectFill" image="Splash" translatesAutoresizingMaskIntoConstraints="NO" id="Spl-As-Hsh">
                                          <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                                      </imageView>
                                  </subviews>
                                  <viewLayoutGuide key="safeArea" id="Bcu-3y-fUS"/>
                                  <color key="backgroundColor" red="1" green="1" blue="1" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                  <constraints>
                                      <constraint firstItem="Spl-As-Hsh" firstAttribute="top" secondItem="Ze5-6b-2t3" secondAttribute="top" id="t1a-aa-001"/>
                                      <constraint firstItem="Spl-As-Hsh" firstAttribute="bottom" secondItem="Ze5-6b-2t3" secondAttribute="bottom" id="b1a-aa-002"/>
                                      <constraint firstItem="Spl-As-Hsh" firstAttribute="leading" secondItem="Ze5-6b-2t3" secondAttribute="leading" id="l1a-aa-003"/>
                                      <constraint firstItem="Spl-As-Hsh" firstAttribute="trailing" secondItem="Ze5-6b-2t3" secondAttribute="trailing" id="r1a-aa-004"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
              <resources>
                  <image name="Splash" width="2732" height="2732"/>
              </resources>
          </document>
          STORYEOF
          echo "=== LaunchScreen.storyboard 上書き完了 ==="
          cat "$STORYBOARD"
      - name: Cocoapods installation
        script: |
          cd ios/App && pod install
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(date +%s)
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - where.is.my.oasis1216@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
