workflows:

  ios-workflow:
    name: Jomon Eats iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jomon.eats
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Sync Capacitor (copy web assets to iOS project)
        script: |
          npx cap sync ios
      - name: Cocoapods installation
        script: |
          cd ios/App && pod install
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - where.is.my.oasis1216@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-workflow:
    name: Jomon Eats Android
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      android_signing:
        - jomon_keystore
      vars:
        PACKAGE_NAME: "com.jomon.eats"
      node: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Sync Capacitor (copy web assets to Android project)
        script: |
          npx cap sync android
      - name: Build Android release (AAB)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - where.is.my.oasis1216@gmail.com
        notify:
          success: true
          failure: true
